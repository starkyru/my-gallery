name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint type-check build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/gallery

            # Pull latest code (reset any local changes like lockfile diffs)
            git checkout -- .
            git pull origin main

            # Install dependencies (CI=true for non-interactive mode)
            CI=true pnpm install --frozen-lockfile

            # Build all packages
            pnpm turbo build

            # Sync database schema (create new tables/columns)
            cd apps/api && pnpm db:sync && cd ../..

            # Restart services
            pm2 stop ecosystem.config.cjs || true
            pm2 delete gallery-api gallery-web 2>/dev/null || true
            sleep 1
            pm2 start ecosystem.config.cjs

            # Wait for services to start, then verify health
            sleep 8

            API_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4000/api/gallery-config)
            WEB_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3002)

            if [ "$API_STATUS" != "200" ] || [ "$WEB_STATUS" != "200" ]; then
              echo "Health check failed! API=$API_STATUS WEB=$WEB_STATUS"
              pm2 logs --nostream --lines 20
              exit 1
            fi

            echo "Deploy successful — API=$API_STATUS WEB=$WEB_STATUS"
            pm2 save
